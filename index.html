<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        var theme = localStorage.getItem("theme");
        if (
          theme === "dark" ||
          (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Preload LCP image -->
    <link
      rel="preload"
      as="image"
      href="/image/OGTags.webp"
      type="image/webp"
      fetchpriority="high"
    />
    <title>Kitinun Khonson - Frontend Developer</title>

    <!-- Primary Meta Tags -->
    <meta name="title" content="Kitinun Khonson - Frontend Developer" />
    <meta
      name="description"
      content="Portfolio of Kitinun Khonson, a passionate Frontend Developer specializing in React, Next.js, and modern web technologies."
    />

    <!-- Open Graph / Facebook / LINE -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kitinun-me.vercel.app/" />
    <meta property="og:title" content="Kitinun Khonson - Frontend Developer" />
    <meta
      property="og:description"
      content="Portfolio of Kitinun Khonson, a passionate Frontend Developer specializing in React, Next.js, and modern web technologies."
    />
    <!-- Image for social share (Resolution should ideally be 1200x630, using profile image for now) -->
    <meta
      property="og:image"
      content="https://kitinun-me.vercel.app/image/OGTags.webp"
    />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://kitinun-me.vercel.app/" />
    <meta
      property="twitter:title"
      content="Kitinun Khonson - Frontend Developer"
    />
    <meta
      property="twitter:description"
      content="Portfolio of Kitinun Khonson, a passionate Frontend Developer specializing in React, Next.js, and modern web technologies."
    />
    <meta
      property="twitter:image"
      content="https://kitinun-me.vercel.app/image/OGTags.webp"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
